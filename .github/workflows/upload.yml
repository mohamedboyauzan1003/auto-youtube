name: Auto YouTube Upload

on:
  schedule:
    # GitHub a veces retrasa el minuto exacto en alta carga.
    # Usar minuto 7 en vez de 0 reduce colisiones con otros miles de jobs
    # que también arrancan en punto.
    - cron: "7 */2 * * *"
  workflow_dispatch:

concurrency:
  group: auto-youtube-upload
  cancel-in-progress: false

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install moviepy==1.0.3 edge-tts requests Pillow google-auth-oauthlib google-auth-httplib2 google-api-python-client numpy

      - name: Run script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TOKEN_JSON: ${{ secrets.TOKEN_JSON }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
        run: python main.py

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs-${{ github.run_number }}
          path: logs/
          retention-days: 14
