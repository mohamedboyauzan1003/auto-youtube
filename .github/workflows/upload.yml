name: Auto YouTube Upload

on:
  schedule:
    - cron: "7 * * * *"   # cada hora en el minuto 7
  workflow_dispatch:

concurrency:
  group: auto-youtube-upload
  cancel-in-progress: false

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-v4
          restore-keys: ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip -q
          pip install moviepy==1.0.3 edge-tts requests Pillow \
            google-auth-oauthlib google-auth-httplib2 \
            google-api-python-client numpy -q

      - name: Restore upload guard from repo
        run: |
          mkdir -p cache
          if [ -f cache/last_upload.json ]; then
            echo "Upload guard found:"; cat cache/last_upload.json
          else
            echo "No upload guard — first run"
          fi

      - name: Run bot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TOKEN_JSON: ${{ secrets.TOKEN_JSON }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          FREESOUND_API_KEY: ${{ secrets.FREESOUND_API_KEY }}
        run: python main.py

      - name: Commit cache back to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache/last_upload.json cache/video_log.csv 2>/dev/null || true
          git diff --staged --quiet || git commit -m "bot: update cache [skip ci]"
          git pull --rebase origin master 2>/dev/null || git pull --rebase origin main 2>/dev/null || true
          git push origin HEAD 2>/dev/null || echo "Push failed"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
